<!DOCTYPE html>
<html>
<head>
<title>TheoSheets</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Georgia, serif;
background:#f5f0e6;
color:#2c2c2c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.container{
max-width:700px;
padding:40px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
margin-bottom:40px;
}

input{
padding:12px;
font-size:16px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
font-size:16px;
background:#c8a96a;
color:white;
border:none;
border-radius:6px;
margin-left:10px;
cursor:pointer;
}

.note{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>TheoSheets</h1>

<div class="subtitle">
Beautiful sheet music for real musicians
</div>

<form>
<input type="email" placeholder="Enter your email">
<button>Get Early Access</button>
</form>

<div class="note">
First 100 subscribers receive a FREE premium score.
</div>

</div>

</body>
</html>
